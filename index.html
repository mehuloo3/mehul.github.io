```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Rotating Cube</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    perspective:800px;
}

.cube{
    position:relative;
    width:200px;
    height:200px;
    transform-style:preserve-3d;
    animation:rotate 6s infinite linear;
}

.face{
    position:absolute;
    width:200px;
    height:200px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:white;
    font-family:Arial;
    border:2px solid white;
}

/* Cube Faces */
.front  { background:red;    transform:translateZ(100px); }
.back   { background:blue;   transform:rotateY(180deg) translateZ(100px); }
.right  { background:green;  transform:rotateY(90deg) translateZ(100px); }
.left   { background:purple; transform:rotateY(-90deg) translateZ(100px); }
.top    { background:orange; transform:rotateX(90deg) translateZ(100px); }
.bottom { background:yellow; transform:rotateX(-90deg) translateZ(100px); }

/* Rotation Animation */
@keyframes rotate{
    from{
        transform:rotateX(0deg) rotateY(0deg);
    }
    to{
        transform:rotateX(360deg) rotateY(360deg);
    }
}
</style>
</head>

<body>

<div class="cube">
    <div class="face front">1</div>
    <div class="face back">2</div>
    <div class="face right">3</div>
    <div class="face left">4</div>
    <div class="face top">5</div>
    <div class="face bottom">6</div>
</div>

</body>
</html>
```
